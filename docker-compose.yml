services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: soundwave
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - media_volume:/app/backend/media
      - static_volume:/app/backend/staticfiles

volumes:
  media_volume:
  static_volume:
